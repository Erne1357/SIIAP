{# app/templates/programs/_floating_buttons.html #}
<div class="floating-back-button">
  <a href="{{ url_for('program.list_programs') }}" class="btn btn-outline-primary btn-back">
    <i class="bi bi-arrow-left me-2"></i>Regresar
  </a>
</div>


 <!-- Botón flotante para inscripción -->
<div class="floating-inscription-button">
  <button
      type="button"
      class="btn btn-primary btn-inscription"
      data-bs-toggle="modal"
      data-bs-target="{{ '#enrollmentModal' if admission_open else '#enrollmentClosedModal' }}">
    <i class="bi bi-mortarboard-fill me-2"></i>Postularme
  </button>
</div>
