# docker/docker-compose.dev.yml
name: SIIAP

services:
  # ─── Base de datos ────────────────────────────────────────────────────────
  db:
    restart: always
    build:
      context: ..
      dockerfile: docker/Dockerfile.db
    environment:
      - TZ=America/Ciudad_Juarez
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ─── Cache / Broker (Redis) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    environment:
      - TZ=America/Ciudad_Juarez
    volumes:
      - redisdata:/data

  # ─── Aplicación web ───────────────────────────────────────────────────────
  web:
    restart: always
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - "5000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ../instance:/app/instance
      - ../:/app
    command: >
      gunicorn
      --bind 0.0.0.0:5000
      --worker-class eventlet
      --workers 1
      --timeout 120
      app:app

  # ─── Celery worker (tareas asíncronas) ────────────────────────────────────
  celery-worker:
    restart: always
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      celery -A app.celery_worker.celery worker
      --loglevel=info
      --concurrency=2
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - SKIP_MIGRATIONS=true
    volumes:
      - ../instance:/app/instance
      - ../:/app

  # ─── Celery Beat (tareas periódicas) ──────────────────────────────────────
  celery-beat:
    restart: always
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      celery -A app.celery_worker.celery beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - SKIP_MIGRATIONS=true
    volumes:
      - ../instance:/app/instance
      - ../:/app

  # ─── Reverse proxy ────────────────────────────────────────────────────────
  nginx:
    restart: always
    image: nginx:stable-alpine
    ports:
      - "80:80"
    depends_on:
      - web
    environment:
      - TZ=America/Ciudad_Juarez
    volumes:
      - ../app/static:/usr/share/nginx/html/static:ro
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
  redisdata:
