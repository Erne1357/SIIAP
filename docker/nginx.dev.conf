# docker/nginx.conf
events { }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Resolver de Docker: re-resuelve hostnames cada 30s.
  # Sin esto, nginx cachea la IP del contenedor 'web' al arrancar y no la
  # actualiza si el contenedor se reinicia y obtiene una IP diferente.
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 80;

    # 1) Sirve /static directamente, con caché agresivo
    location /static/ {
      alias /usr/share/nginx/html/static/;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 2) WebSocket upgrade para Socket.IO
    location /socket.io/ {
      # La variable con el esquema+host completo (sin path) hace que nginx:
      # a) use el resolver para re-resolver 'web' dinámicamente, y
      # b) pase la URI original sin reescribir (/socket.io/?EIO=4&...).
      #    Si se pusiera un path en proxy_pass nginx reescribiría la URL y
      #    perdería los query params, causando el 400 "unsupported EIO version".
      set $upstream http://web:5000;
      proxy_pass         $upstream;
      proxy_http_version 1.1;
      proxy_buffering    off;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400;
    }

    # 3) Todo lo demás lo proxyea al contenedor 'web'
    location / {
      set $upstream http://web:5000;
      proxy_pass         $upstream;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
